spring.application.name=api-gateway-service

server.port=8000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.cloud.gateway.discovery.locater.enabled=false
eureka.cloud.netflix.eureka.discovery.enabled=true

spring.cloud.gateway.routes[0].id=products-service
spring.cloud.gateway.routes[0].uri=lb://PRODUCTS-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/products/**

spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/orders/**

logging.level.org.springframework.cloud.gateway=TRACE